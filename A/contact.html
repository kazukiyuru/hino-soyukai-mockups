<section>
  <h3>お問い合わせ</h3>
  <p>見学・入会のご相談、その他お問い合わせはこちらのフォームからお気軽にご連絡ください。</p>
  <form class="contact-form" data-web3forms-key="YOUR_ACCESS_KEY_HERE">
    <label for="name">お名前（全角）<span class="required">必須</span></label>
    <input type="text" id="name" name="name" placeholder="山田 太郎">

    <fieldset class="radio-group">
      <legend>性別</legend>
      <label><input type="radio" name="gender" value="male"> 男性</label>
      <label><input type="radio" name="gender" value="female"> 女性</label>
    </fieldset>

    <label for="age">年齢（半角数字）</label>
    <input type="number" id="age" name="age" min="0" max="120" placeholder="65">

    <label for="email">メールアドレス<span class="required">必須</span></label>
    <input type="email" id="email" name="email" placeholder="example@mail.com">
    <label for="email2">メールアドレス（確認用・同じものを再入力）<span class="required">必須</span></label>
    <input type="email" id="email2" name="email2" placeholder="example@mail.com">

    <fieldset class="radio-group category">
      <legend>ご連絡種別（いずれか1つ）<span class="required">必須</span></legend>
      <label><input type="radio" name="category" value="join"> 入会申し込み</label>
      <label><input type="radio" name="category" value="trial"> 体験参加申し込み</label>
      <label><input type="radio" name="category" value="question"> 問い合わせ</label>
      <label><input type="radio" name="category" value="other"> その他</label>
    </fieldset>

    <label for="date">朝練参加希望日（半角・例：01-01）</label>
    <input type="text" id="date" name="date" placeholder="例：01-01（1月1日）">

    <label for="message">メッセージ<span class="required">必須</span></label>
    <textarea id="message" name="message" rows="5" placeholder="見学希望の旨など、ご自由にご記入ください"></textarea>

    <label for="address">住所（全角）</label>
    <input type="text" id="address" name="address" placeholder="例：東京都日野市万願寺6丁目6番地">

    <label for="phone">連絡先（携帯）電話番号（半角）</label>
    <input type="tel" id="phone" name="phone" placeholder="例：090-0000-0000">

    <button type="button">送信する</button>
  </form>
</section>
